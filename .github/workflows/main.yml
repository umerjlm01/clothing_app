name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 🚀 Setup Flutter (FIXED)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 🔍 Verify installation
      - name: Flutter Doctor
        run: flutter doctor

      # 📦 Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 🧠 Analyze code
      - name: Analyze project
        run: flutter analyze

      # 🧪 Run tests
      - name: Run tests
        run: flutter test

      # 📱 (Optional) Build APK
      - name: Build APK
        run: flutter build apk --release
